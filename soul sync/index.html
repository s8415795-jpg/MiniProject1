<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soul Sync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Three.js and GLTF loader libraries -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/loaders/GLTFLoader.js"></script>
  <script defer src="script.js"></script>
</head>
<body class="bg-blue-50 font-sans h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-blue-200 p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-blue-900">Soul Sync</h1>
    <div class="space-x-4 text-blue-800">
      <button onclick="showSection('homeScreen')">Home</button>
      <button onclick="showSection('chatScreen')">Chat</button>
      <button onclick="showSection('moodScreen')">Mood</button>
      <button onclick="showSection('journalScreen')">Journal</button>
      <button onclick="showSection('toolkitScreen')">Toolkit</button>
      <button onclick="showSection('profileScreen')">Profile</button>
    </div>
  </nav>

  <!-- Home -->
  <section id="homeScreen" class="flex flex-col items-center justify-center flex-1 text-center px-6">
    <img src="avtar.png" class="w-32 mb-4" alt="Avatar">
    <h2 class="text-3xl font-semibold text-blue-900 mb-2">Welcome to Soul Sync 🌿</h2>
    <p class="text-blue-700 mb-6">Your digital friend for calm, clarity, and connection.</p>
    <button onclick="showSection('chatScreen')" class="bg-blue-400 hover:bg-blue-500 text-white px-6 py-3 rounded-lg">Start Chat</button>
  </section>

  <!-- Chat -->
  <section id="chatScreen" class="hidden flex flex-col flex-1 relative">
    <div class="bg-blue-100 flex items-center gap-3 p-3 border-b border-blue-200">
      <div id="avatarContainer" class="w-20 h-20"></div>
      <h2 class="text-blue-900 text-lg font-semibold">Your Companion</h2>
    </div>

    <div id="chatArea" class="flex-1 p-4 overflow-y-auto space-y-3"></div>

    <div class="p-4 bg-blue-100 flex gap-2">
      <input id="userInput" type="text" placeholder="Type your message..." class="flex-1 p-2 rounded-lg border border-blue-300">
      <button id="sendBtn" class="bg-blue-400 text-white px-4 py-2 rounded-lg">Send</button>
      <button id="voiceBtn" class="bg-blue-300 text-white px-4 py-2 rounded-lg">🎤</button>
    </div>
  </section>

  <!-- Mood Tracker -->
  <section id="moodScreen" class="hidden flex flex-col items-center justify-center flex-1">
    <h2 class="text-2xl font-semibold text-blue-900 mb-4">How are you feeling today?</h2>
    <div class="flex space-x-4 text-4xl">
      <button onclick="saveMood('😄')">😄</button>
      <button onclick="saveMood('🙂')">🙂</button>
      <button onclick="saveMood('😐')">😐</button>
      <button onclick="saveMood('😔')">😔</button>
      <button onclick="saveMood('😭')">😭</button>
    </div>
    <p id="moodMessage" class="mt-4 text-blue-700"></p>
  </section>

  <!-- Journal -->
  <section id="journalScreen" class="hidden flex flex-col items-center flex-1 p-6">
    <h2 class="text-2xl font-semibold text-blue-900 mb-4">Journal Your Thoughts 🖊️</h2>
    <textarea id="journalInput" class="w-full max-w-xl h-40 p-3 rounded-lg border border-blue-300 mb-4" placeholder="Write how you feel..."></textarea>
    <button onclick="saveJournal()" class="bg-blue-400 hover:bg-blue-500 text-white px-6 py-2 rounded-lg">Save Entry</button>
    <h3 class="text-blue-800 mt-6 mb-2">Previous Entries:</h3>
    <div id="journalList" class="w-full max-w-xl space-y-2"></div>
  </section>

  <!-- Wellness Toolkit -->
  <section id="toolkitScreen" class="hidden flex flex-col items-center justify-center flex-1">
    <h2 class="text-2xl font-semibold	text-blue-900 mb-4">Wellness Toolkit 🌼</h2>
    <div class="space-y-3 text-center">
      <button onclick="breathingExercise()" class="bg-blue-300 hover:bg-blue-400 text-white px-6 py-3 rounded-lg w-60">Breathing Exercise</button>
      <button onclick="affirmation()" class="bg-blue-300 hover:bg-blue-400 text-white px-6 py-3 rounded-lg w-60">Positive Affirmation</button>
      <button onclick="mindfulnessTip()" class="bg-blue-300 hover:bg-blue-400 text-white px-6 py-3 rounded-lg w-60">Mindfulness Tip</button>
    </div>
    <p id="toolkitMessage" class="mt-6 text-blue-700"></p>
  </section>

  <!-- Profile -->
  <section id="profileScreen" class="hidden flex flex-col items-center justify-center flex-1">
    <h2 class="text-2xl font-semibold text-blue-900 mb-4">Your Profile</h2>
    <input id="userName" type="text" placeholder="Enter your name" class="border border-blue-300 p-2 rounded-lg mb-3">
    <button onclick="saveProfile()" class="bg-blue-400 hover:bg-blue-500 text-white px-6 py-2 rounded-lg">Save Name</button>
    <p id="profileMessage" class="mt-3 text-blue-700"></p>
  </section>

</body>
</html>
